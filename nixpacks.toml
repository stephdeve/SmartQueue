# Railway (Nixpacks) configuration
# Purpose: ensure builds don't fail when optional PHP extensions are missing in the build environment.
# This project uses `simplesoftwareio/simple-qrcode` which requires ext-gd.
# Installing gd via Nixpacks is possible, but the fastest unblock is to ignore the platform req during build.

[phases.setup]
# Keep the default detected packages, but add libraries that help compile common PHP extensions if needed.
# (Nixpacks will ignore unknown package names if not applicable.)
nixPkgs = ["php82", "php82Extensions.gd"]

[phases.install]
cmds = [
  "composer install --no-interaction --prefer-dist --optimize-autoloader --no-scripts --ignore-platform-req=ext-gd",
  "npm ci",
  "npm prune --omit=dev --ignore-scripts"
]

[phases.build]
cmds = [
  "npm run build",
  "mkdir -p storage/framework/{sessions,views,cache,testing} storage/logs bootstrap/cache && chmod -R a+rw storage",
  "php artisan config:cache",
  "php artisan event:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan serve --host 0.0.0.0 --port $PORT"
